# Font
font_family      Hack Nerd Font
font_size        10.0

# Window
initial_window_width  275c
initial_window_height 75c

# Terminal
term xterm-256color

# Colors (Nightfox theme)
background #192330
foreground #cdcecf

# Normal colors
color0  #393b44
color1  #c94f6d
color2  #81b29a
color3  #dbc074
color4  #719cd6
color5  #9d79d6
color6  #63cdcf
color7  #dfdfe0

# Bright colors
color8  #575860
color9  #d16983
color10 #8ebaa4
color11 #e0c989
color12 #86abdc
color13 #baa1e2
color14 #7ad4d6
color15 #e4e4e5

# Open URLs and files with default handler
open_url_with default

# Enable clicking on files/URLs
mouse_map left click ungrabbed mouse_handle_click selection link prompt
